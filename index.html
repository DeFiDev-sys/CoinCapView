<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>CoinCapView - Real-Time Cryptocurrency Dashboard & Market Data</title>
    <meta name="title" content="CoinCapView - Real-Time Cryptocurrency Dashboard & Market Data" />
    <meta name="description" content="Track cryptocurrency prices, market cap, volume, and trends in real-time. Beautiful dashboard showing Bitcoin, Ethereum, and 50+ top coins with 24h/7d changes." />
    <meta name="keywords" content="cryptocurrency, crypto, bitcoin, ethereum, btc, eth, market cap, trading, prices, dashboard, crypto tracker, coin prices, crypto market" />
    <meta name="author" content="CoinCapView" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://coincapview.com/" />
    <meta property="og:title" content="CoinCapView - Real-Time Cryptocurrency Dashboard" />
    <meta property="og:description" content="Track cryptocurrency prices, market cap, and trends in real-time. Beautiful dashboard showing Bitcoin, Ethereum, and 50+ top coins." />
    <meta property="og:image" content="https://coincapview.com/og-image.png" />
    <meta property="og:site_name" content="CoinCapView" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://coincapview.com/" />
    <meta property="twitter:title" content="CoinCapView - Real-Time Cryptocurrency Dashboard" />
    <meta property="twitter:description" content="Track cryptocurrency prices, market cap, and trends in real-time. Beautiful dashboard showing Bitcoin, Ethereum, and 50+ top coins." />
    <meta property="twitter:image" content="https://coincapview.com/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0f0f1a" />
    <meta name="msapplication-TileColor" content="#0f0f1a" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://coincapview.com/" />

    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://api.coinmarketcap.com">
    <link rel="preconnect" href="https://cryptoicons.org">

    <!-- Structured Data - JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "CoinCapView",
      "description": "Real-time cryptocurrency dashboard tracking prices, market cap, and trends for 50+ top cryptocurrencies.",
      "url": "https://coincapview.com",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web Browser",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Real-time cryptocurrency prices",
        "Market cap and volume data",
        "24h and 7d price changes",
        "Search and filter coins",
        "Responsive design",
        "Auto-refresh every 60 seconds"
      ]
    }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
