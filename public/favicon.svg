<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a080;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#0f0f1a" stroke="url(#grad)" stroke-width="2"/>

  <!-- C letter -->
  <text x="32" y="43" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="url(#grad)">C</text>

  <!-- Small chart accent line -->
  <polyline points="18,48 25,42 32,46 40,38 46,42" fill="none" stroke="#00d4aa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
</svg>